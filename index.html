<script>

// Function to check and adjust font size when two characters

function adjustFontSize(element) {
//element.style.fontSize = parseFloat(element.parentElement.style.width) / 1.5 + 'px';

    let maxFontSize = parseFloat(element.parentElement.style.width) / 1.5; // Set a maximum font size
	//console.log(`maxFontSize: ${maxFontSize}`)
	element.style.fontSize = maxFontSize + 'px';

do {
    var containerWidth = element.offsetWidth;
    var contentWidth = element.scrollWidth; // Actual width of content
    var currentFontSize = parseFloat(window.getComputedStyle(element).fontSize);
	//console.log(`currentFontSize: ${currentFontSize}`)
	//console.log(`maxFontSize: ${maxFontSize}`)

    // If content overflows, calculate a new smaller font size
    if (contentWidth > containerWidth) {
	
        // Simple scaling calculation (adjust multiplier as needed)
        // This is a basic example; more complex calculations may be needed for precise fitting.
        var newSize = (containerWidth / contentWidth) * currentFontSize * 0.99; 
		//console.log(`newSize: ${newSize}`);
		
        // Cap the font size at the maximum allowed
        if (newSize > maxFontSize) {
            newSize = maxFontSize;
        }
        element.style.fontSize = newSize + 'px';
    }
	//var computedSize = window.getComputedStyle(element).fontSize;
	//console.log(`containerWidth: ${containerWidth}`);
	//console.log(`contentWidth: ${contentWidth}`);
	//console.log(element);
	//console.log(newSize);
	//console.log(`Actual font-size: ${computedSize}`); 

} while (contentWidth > containerWidth);
}
</script>
